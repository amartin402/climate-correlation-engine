# pipelines/temperature_pipeline/pipeline.yml
# -------------------------------------------------------
# BRUIN PIPELINE DEFINITION: Temperature
# -------------------------------------------------------
# This file tells Bruin:
#   - What this pipeline is called
#   - What schedule to run it on
#   - Which GCP connection to use
#   - Where the Python interpreter lives (our uv venv)
#   - Which extra folders to scan for assets (includes)
#
# WHY includes IS NEEDED:
#   Bruin scans for @bruin asset blocks relative to the
#   pipeline.yml location by default. Since our ingestion
#   script lives in ingestion/ and the SQL transformation
#   lives in bigquery/ — both outside this pipeline folder
#   — we must explicitly tell Bruin to include those paths.
#   Without this, Bruin only finds load_to_staging.py and
#   reports "1 asset" instead of the full chain of 3.
# -------------------------------------------------------

name: temperature_pipeline
# schedule: "0 2 * * *"

# Scan these folders for @bruin asset definitions in
# addition to this pipeline's own folder.
# Paths are relative to the repo root.
# includes:
#   - ingestion/download_temperature.py
#   - bigquery/temperature_model.sql

# Default connection used by all assets in this pipeline.
# The connection named 'gcp_climate' must be configured in
# your Bruin workspace config (~/.bruin/config.yml) with
# your service account credentials.
default_connections:
  google_cloud_platform: gcp_climate

# Point Bruin at the uv venv Python interpreter so it uses
# the same packages installed by setup.sh
environments:
  default:
    python:
      executable: /workspaces/climate-correlation-engine/.venv/bin/python
